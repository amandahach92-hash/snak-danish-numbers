<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danish Pronouns - Nordic Learning</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f9f7f2;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #767676;
            --accent: #8da290; 
            --correct: #a3b18a;
            --wrong: #e29578;
            --border: #e0ddd5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #quiz-container {
            width: 95%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
            padding-bottom: 40px;
            min-height: 550px;
        }

        .header-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .content-padding { padding: 0 30px; }

        .progress-container { width: 100%; height: 3px; background: #eee; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 30px 0;
            text-align: center;
            font-weight: 400;
        }

        .instruction-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .question-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border);
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        button:hover { border-color: var(--text-main); background-color: #fafafa; }
        button.correct { background-color: var(--correct) !important; border-color: var(--correct); color: white; }
        button.wrong { background-color: var(--wrong) !important; border-color: var(--wrong); color: white; }

        .grammar-note {
            margin-top: 25px;
            padding: 20px;
            background: #fdfcf9;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            line-height: 1.6;
            color: #444;
            display: none;
            position: relative;
        }

        .note-timer { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0%; }

        .feedback { margin-top: 15px; height: 20px; text-align: center; font-style: italic; color: var(--accent); }

        .welcome-screen, .result-screen { text-align: center; padding: 30px; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
            text-align: center;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--text-main);
            color: white;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px;
            border: none;
            cursor: pointer;
        }

        .slide-in { animation: slideIn 0.5s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes noteProgress { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-app"></div>
</div>

<script>
    const questions = [
        { q: "___ spiser et æble.", a: ["jeg", "mig", "min", "mit"], correct: 0, type: "Subject, 1st p. singular", note: "Use <strong>'jeg'</strong> (I) when you are the person performing the action.", img: "https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?auto=format&fit=crop&q=80&w=800" },
        { q: "Hun kigger på ___.", a: ["jeg", "mig", "min", "mit"], correct: 1, type: "Object, 1st p. singular", note: "Use <strong>'mig'</strong> (me) when you are receiving the action.", img: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ bil.", a: ["min", "mit", "mine", "mig"], correct: 0, type: "Possessive (en-word)", note: "<strong>'Min'</strong> is used for common gender nouns like 'en bil'.", img: "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ hus.", a: ["min", "mit", "mine", "mig"], correct: 1, type: "Possessive (et-word)", note: "<strong>'Mit'</strong> is used for neuter gender nouns like 'et hus'.", img: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ ting.", a: ["min", "mit", "mine", "mig"], correct: 2, type: "Possessive (plural)", note: "<strong>'Mine'</strong> is the plural form for all nouns.", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=800" },
        { q: "___ er min ven.", a: ["du", "dig", "din", "dit"], correct: 0, type: "Subject, 2nd p. singular", note: "Use <strong>'du'</strong> when addressing someone as the subject.", img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=800" },
        { q: "Jeg kan godt lide ___.", a: ["du", "dig", "din", "dit"], correct: 1, type: "Object, 2nd p. singular", note: "Use <strong>'dig'</strong> (you) as the object form.", img: "https://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?auto=format&fit=crop&q=80&w=800" },
        { q: "Er det ___ taske?", a: ["din", "dit", "dine", "dig"], correct: 0, type: "Possessive (en-word)", note: "<strong>'Din'</strong> matches common gender nouns (en-words).", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&q=80&w=800" },
        { q: "Er det ___ ur?", a: ["din", "dit", "dine", "dig"], correct: 1, type: "Possessive (et-word)", note: "<strong>'Dit'</strong> matches neuter gender nouns like 'et ur'.", img: "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?auto=format&fit=crop&q=80&w=800" },
        { q: "Er det ___ nøgler?", a: ["din", "dit", "dine", "dig"], correct: 2, type: "Possessive (plural)", note: "<strong>'Dine'</strong> is used for plural possessions.", img: "https://images.unsplash.com/photo-1582139329536-e7284fece509?auto=format&fit=crop&q=80&w=800" },
        { q: "___ læser en bog.", a: ["han", "ham", "hans", "hun"], correct: 0, type: "Subject (Male)", note: "<strong>'Han'</strong> is the subject form for 'he'.", img: "https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&q=80&w=800" },
        { q: "Jeg skriver til ___.", a: ["han", "ham", "hans", "hun"], correct: 1, type: "Object (Male)", note: "<strong>'Ham'</strong> is the object form for 'him'.", img: "https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ cykel.", a: ["han", "ham", "hans", "hun"], correct: 2, type: "Possessive (Male)", note: "<strong>'Hans'</strong> means 'his'. It never changes form.", img: "https://images.unsplash.com/photo-1485965120184-e220f721d03e?auto=format&fit=crop&q=80&w=800" },
        { q: "___ hedder Mette.", a: ["hun", "hende", "hendes", "ham"], correct: 0, type: "Subject (Female)", note: "<strong>'Hun'</strong> is the subject form for 'she'.", img: "https://images.unsplash.com/photo-1503104834685-7205e8607eb9?auto=format&fit=crop&q=80&w=800" },
        { q: "Jeg giver gaven til ___.", a: ["hun", "hende", "hendes", "ham"], correct: 1, type: "Object (Female)", note: "<strong>'Hende'</strong> is the object form for 'her'.", img: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ taske.", a: ["hun", "hende", "hendes", "ham"], correct: 2, type: "Possessive (Female)", note: "<strong>'Hendes'</strong> means 'her' (possessive).", img: "https://images.unsplash.com/photo-1492707892479-7bc8d5a4ee93?auto=format&fit=crop&q=80&w=800" },
        { q: "Han vasker ___.", a: ["han", "ham", "sig", "sin"], correct: 2, type: "Reflexive", note: "Use <strong>'sig'</strong> when the subject acts upon themselves.", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=800" },
        { q: "Han henter ___ taske.", a: ["sin", "sit", "sine", "sig"], correct: 0, type: "Reflexive Possessive (en)", note: "<strong>'Sin'</strong> means 'his own'.", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&q=80&w=800" },
        { q: "Hun henter ___ ur.", a: ["sin", "sit", "sine", "sig"], correct: 1, type: "Reflexive Possessive (et)", note: "<strong>'Sit'</strong> means 'her own'.", img: "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?auto=format&fit=crop&q=80&w=800" },
        { q: "Han spiser ___ æbler.", a: ["sin", "sit", "sine", "sig"], correct: 2, type: "Reflexive Possessive (plural)", note: "<strong>'Sine'</strong> means 'his/her own' plural items.", img: "https://images.unsplash.com/photo-1680868164438-c4e31c0ceb2e?auto=format&fit=crop&q=80&w=800" },
        { q: "___ skal i biografen.", a: ["vi", "os", "vores", "jer"], correct: 0, type: "Subject, 1st p. plural", note: "<strong>'Vi'</strong> means 'we'.", img: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=800" },
        { q: "Vil du med ___?", a: ["vi", "os", "vores", "jer"], correct: 1, type: "Object, 1st p. plural", note: "<strong>'Os'</strong> means 'us'.", img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ hus.", a: ["vi", "os", "vores", "voreses"], correct: 2, type: "Possessive (we)", note: "<strong>'Vores'</strong> (our) is the same for all genders.", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=800" },
        { q: "Hvad laver ___?", a: ["I", "jer", "jeres", "os"], correct: 0, type: "Subject, 2nd p. plural", note: "<strong>'I'</strong> means 'you' (plural).", img: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=800" },
        { q: "Jeg kigger på ___.", a: ["I", "jer", "jeres", "os"], correct: 1, type: "Object, 2nd p. plural", note: "<strong>'Jer'</strong> is the plural object form of 'you'.", img: "https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&q=80&w=800" },
        { q: "Er det ___ hund?", a: ["I", "jer", "jeres", "os"], correct: 2, type: "Possessive (you plural)", note: "<strong>'Jeres'</strong> means 'your' (plural).", img: "https://images.unsplash.com/photo-1587300003388-59208cc962cb?auto=format&fit=crop&q=80&w=800" },
        { q: "___ spiser aftensmad.", a: ["de", "dem", "deres", "jer"], correct: 0, type: "Subject, 3rd p. plural", note: "<strong>'De'</strong> means 'they'.", img: "https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=800" },
        { q: "Jeg kender ___ godt.", a: ["de", "dem", "deres", "jer"], correct: 1, type: "Object, 3rd p. plural", note: "<strong>'Dem'</strong> means 'them'.", img: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=800" },
        { q: "Det er ___ hus.", a: ["de", "dem", "deres", "jer"], correct: 2, type: "Possessive (they)", note: "<strong>'Deres'</strong> means 'their'.", img: "https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&q=80&w=800" }
    ];

    let currentIdx = 0;
    let userName = "";
    let shuffledQuestions = [];
    let audioCtx = null;

    function showWelcome() {
        const app = document.getElementById('quiz-app');
        app.innerHTML = `
            <div class="welcome-screen slide-in">
                <img src="https://images.unsplash.com/photo-1513622470522-26c3c8a854bc?auto=format&fit=crop&q=80&w=800" class="header-image" style="height: 250px; margin: -30px 0 20px 0; width: calc(100% + 60px); margin-left: -30px;">
                <h1>Velkommen</h1>
                <p style="color: var(--text-muted); margin-bottom: 30px;">Start your Danish journey. Please enter your name.</p>
                <input type="text" id="user-name" placeholder="Your Name">
                <button class="btn-action" onclick="startQuiz()">Start Challenge</button>
            </div>
        `;
    }

    function startQuiz() {
        const input = document.getElementById('user-name');
        userName = input.value.trim() || "Student";
        shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
        currentIdx = 0;
        renderQuestion();
    }

    function renderQuestion() {
        const app = document.getElementById('quiz-app');
        if (currentIdx >= shuffledQuestions.length) {
            showResults();
            return;
        }

        const q = shuffledQuestions[currentIdx];
        const progress = (currentIdx / shuffledQuestions.length) * 100;
        
        app.innerHTML = `
            <img src="${q.img}" class="header-image">
            <div class="progress-container"><div id="progress-bar" style="width: ${progress}%"></div></div>
            <div class="content-padding slide-in">
                <span class="instruction-text">Question ${currentIdx + 1} of ${shuffledQuestions.length} &bull; ${q.type}</span>
                <div class="question-text">${q.q}</div>
                <div class="options-grid">
                    ${q.a.map((ans, i) => `<button onclick="checkAnswer(${i})">${ans}</button>`).join('')}
                </div>
                <div id="grammar-note" class="grammar-note">
                    ${q.note}
                    <div class="note-timer" id="note-timer"></div>
                </div>
                <div id="feedback" class="feedback"></div>
            </div>
        `;
    }

    function checkAnswer(chosen) {
        const q = shuffledQuestions[currentIdx];
        const buttons = document.querySelectorAll('.options-grid button');
        const feedback = document.getElementById('feedback');
        const note = document.getElementById('grammar-note');
        const timer = document.getElementById('note-timer');

        if (chosen === q.correct) {
            buttons[chosen].classList.add('correct');
            feedback.innerText = `Brilliant, ${userName}!`;
            note.style.display = "block";
            timer.style.animation = "noteProgress 5s linear forwards";
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playChime();
            if (window.confetti) confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });

            setTimeout(() => {
                currentIdx++;
                renderQuestion();
            }, 5000);
        } else {
            buttons[chosen].classList.add('wrong');
            feedback.innerText = "Try once more...";
            setTimeout(() => {
                buttons[chosen].classList.remove('wrong');
                feedback.innerText = "";
            }, 1200);
        }
    }

    function playChime() {
        const now = audioCtx.currentTime;
        [659, 830].forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.value = f;
            g.gain.setValueAtTime(0, now + (i * 0.1));
            g.gain.linearRampToValueAtTime(0.05, now + (i * 0.1) + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, now + (i * 0.1) + 0.8);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(now + (i * 0.1)); o.stop(now + (i * 0.1) + 0.8);
        });
    }

    function showResults() {
        document.getElementById('quiz-app').innerHTML = `
            <div class="result-screen slide-in">
                <img src="https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?auto=format&fit=crop&q=80&w=800" class="header-image" style="margin-top: -30px; margin-bottom: 20px; width: calc(100% + 80px); margin-left: -30px;">
                <h1>Bravo, ${userName}!</h1>
                <p style="color: var(--text-muted); line-height: 1.6;">You mastered the Danish pronouns. Truly inspiring!</p>
                <button class="btn-action" onclick="location.reload()">Restart</button>
            </div>
        `;
    }

    showWelcome();
</script>

</body>
</html>
